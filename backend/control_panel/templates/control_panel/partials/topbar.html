<header id="page-topbar"><div class="layout-width"><div class="navbar-header"><div class="d-flex"><button type="button" class="btn btn-sm px-3 fs-16 header-item vertical-menu-btn topnav-hamburger" id="topnav-hamburger-icon"><span class="hamburger-icon"><span></span><span></span><span></span></span></button><div class="navbar-brand-title d-none d-md-flex align-items-center"><span class="fw-semibold">{{ page_title|default:"پنل ریتاچر" }}</span></div></div><div class="d-flex align-items-center"><div class="ms-1 header-item d-none d-sm-flex"><button type="button" class="btn btn-icon btn-topbar btn-ghost-secondary rounded-circle light-dark-mode"><i class="bx bx-moon fs-22"></i></button></div><div class="dropdown ms-sm-3 header-item topbar-user"><button type="button" class="btn" data-bs-toggle="dropdown"><span class="d-flex align-items-center"><span class="avatar-title bg-primary-subtle text-primary rounded-circle fs-18">{{ request.user.username|first|upper }}</span><span class="text-start ms-xl-2"><span class="d-none d-xl-inline-block ms-1 fw-medium user-name-text">{{ request.user.get_full_name|default:request.user.username }}</span><span class="d-none d-xl-block ms-1 fs-12 user-name-sub-text">{{ panel_role_label }}</span></span></span></button><div class="dropdown-menu dropdown-menu-end"><h6 class="dropdown-header">خوش آمدید {{ request.user.username }}</h6><a class="dropdown-item" href="{% url 'control_panel:settings' %}"><i class="mdi mdi-cog-outline text-muted fs-16 align-middle me-1"></i> تنظیمات</a><div class="dropdown-divider"></div><form method="post" action="{% url 'control_panel:logout' %}">{% csrf_token %}<button class="dropdown-item" type="submit"><i class="mdi mdi-logout text-muted fs-16 align-middle me-1"></i> خروج</button></form></div></div></div></div></div></header>
