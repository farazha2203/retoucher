        examples:
          Newest:
            value: newest
          TopRated:
            value: top_rated
            summary: Top rated
          MostDeliveries:
            value: most_deliveries
            summary: Most deliveries
          MostCommented:
            value: most_commented
            summary: Most commented
      - in: query
        name: page
        schema:
          type: integer
        description: Page number.
      - in: query
        name: page_size
        schema:
          type: integer
        description: Items per page. Defaults to 10, max 50.
      - in: query
        name: search
        schema:
          type: string
        description: Search editors by username, first name, or last name.
      tags:
      - Public Portfolio
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicEditorListResponse'
              examples:
                PaginatedPublicEditorsResponse:
                  value:
                    count: 2
                    next: null
                    previous: null
                    results:
                    - id: 12
                      username: retouch_editor
                      first_name: Ali
                      last_name: Ahmadi
                      stats:
                        public_deliveries_count: 3
                        public_comments_count: 5
                        public_orders_count: 2
                      rating:
                        average: 4.5
                        count: 2
                    meta:
                      ordering: newest
                      available_orderings:
                      - newest
                      - top_rated
                      - most_deliveries
                      - most_commented
                      search: ''
                  summary: Paginated public editors response
                EmptyPaginatedPublicEditorsResponse:
                  value:
                    count: 0
                    next: null
                    previous: null
                    results: []
                    meta:
                      ordering: newest
                      available_orderings:
                      - newest
                      - top_rated
                      - most_deliveries
                      - most_commented
                      search: missing
