components:
  schemas:
    ActivityTypeEnum:
      enum:
      - order_submitted
      - review_started
      - editor_assigned
      - work_started
      - delivery_uploaded
      - supervisor_approved
      - supervisor_revision_requested
      - editor_revision_started
      - client_approved
      - client_revision_requested
      - supervisor_accepted_client_revision
      - supervisor_rejected_client_revision
      - comment_created
      - comment_updated
      - comment_deleted
      - rating_created
      - rating_updated
      - settlement_started
      - payment_recorded
      - order_closed
      - comment_resolved
      - comment_unresolved
      type: string
      description: |-
        * `order_submitted` - Order Submitted
        * `review_started` - Review Started
        * `editor_assigned` - Editor Assigned
        * `work_started` - Work Started
        * `delivery_uploaded` - Delivery Uploaded
        * `supervisor_approved` - Supervisor Approved
        * `supervisor_revision_requested` - Supervisor Revision Requested
        * `editor_revision_started` - Editor Revision Started
        * `client_approved` - Client Approved
        * `client_revision_requested` - Client Revision Requested
        * `supervisor_accepted_client_revision` - Supervisor Accepted Client Revision
        * `supervisor_rejected_client_revision` - Supervisor Rejected Client Revision
        * `comment_created` - Comment Created
        * `comment_updated` - Comment Updated
        * `comment_deleted` - Comment Deleted
        * `rating_created` - Rating Created
        * `rating_updated` - Rating Updated
        * `settlement_started` - Settlement Started
        * `payment_recorded` - Payment Recorded
        * `order_closed` - Order Closed
        * `comment_resolved` - Comment resolved
        * `comment_unresolved` - Comment unresolved
    AnnotationType379Enum:
      enum:
      - none
      - point
      - rectangle
      - circle
      - arrow
      - freehand
      type: string
      description: |-
        * `none` - None
        * `point` - Point
        * `rectangle` - Rectangle
        * `circle` - Circle
        * `arrow` - Arrow
        * `freehand` - Freehand
    AnnotationType663Enum:
      enum:
      - none
      - point
      - rectangle
      - circle
      - arrow
      - freehand
      type: string
      description: |-
        * `none` - none
        * `point` - point
        * `rectangle` - rectangle
        * `circle` - circle
        * `arrow` - arrow
        * `freehand` - freehand
    AssignEditorRequestRequest:
      type: object
      properties:
        editor_id:
          type: integer
      required:
      - editor_id
    CategoryEnum:
      enum:
      - quality
      - scope
      - deadline
      - payment
      - other
      type: string
      description: |-
        * `quality` - Quality issue
        * `scope` - Scope change
        * `deadline` - Deadline missed
        * `payment` - Payment dispute
        * `other` - Other
    CommentCreateRequestRequest:
      type: object
      properties:
        parent:
          type: integer
        target_type:
          $ref: '#/components/schemas/CommentCreateRequestTargetTypeEnum'
        image:
          type: integer
        delivery:
          type: integer
        revision:
          type: integer
        text:
          type: string
          minLength: 1
        x:
          type: number
          format: double
        y:
          type: number
          format: double
        annotation_type:
          $ref: '#/components/schemas/AnnotationType663Enum'
        annotation_label:
          type: string
        annotation_color:
          type: string
        annotation_data: {}
      required:
      - text
    CommentCreateRequestTargetTypeEnum:
      enum:
      - order
      - image
      - delivery
      - revision
      type: string
      description: |-
        * `order` - order
        * `image` - image
        * `delivery` - delivery
        * `revision` - revision
    CommentStatusRequestRequest:
      type: object
