        order_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,14}(?:\.\d{0,0})?$
          description: Original order amount (agreed_price)
        penalty_amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,14}(?:\.\d{0,0})?$
          readOnly: true
          description: Penalty amount deducted from editor
        penalty_percent:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
